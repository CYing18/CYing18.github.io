short_bio: >-

  <p>
    I am an incoming Ph.D. student at
    <a href="https://www.columbia.edu/" target="_blank">Columbia University</a>,
    where I will join the
    <a href="https://labs-laboratory.com/" target="_blank">Laboratory of AI & Biomedical Science (LABS)</a>
    under the supervision of Prof. Junhao Wen.
    I completed my master's studies at Xiamen University
    under the supervision of
    <a href="https://scholar.google.com/citations?user=Uh1EpKQAAAAJ&hl=zh-CN" target="_blank">Prof. Rongshan Yu</a>.
  </p>

  <p>
    My research interests lie at AI for science, with a particular focus on
    foundation models, generative AI, and multimodal learning for biomedical applications. 
    My long-term goal is to build intelligent
    computational models that advance our understanding of human health and disease.
  </p>


