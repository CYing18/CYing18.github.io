short_bio: >-
  <p>
    I am an incoming Ph.D. student in Biomedical Engineering at
    <a href="https://www.columbia.edu/" target="_blank">Columbia University</a>.
    My research interests lie at the intersection of artificial intelligence,
    biomedical engineering, and neuroscience, with a particular focus on
    foundation models, generative AI, and multimodal learning for biomedical applications.
  </p>
  <p>
    I am broadly interested in developing generalizable AI systems that can learn
    from heterogeneous biomedical data, including neural recordings, medical imaging,
    pathology, and clinical information. My long-term goal is to build intelligent
    computational models that advance our understanding of human health and disease.
  </p>

